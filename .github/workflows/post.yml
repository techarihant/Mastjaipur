name: MastJaipur Daily Post
on:
  schedule:
    - cron: '30 1 * * *' # 7:00 AM IST
  workflow_dispatch: 

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install google-genai requests pillow

      - name: Run Python Script
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
        run: python main.py

      - name: Deploy to GitHub Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          # The -f forces it, and || true prevents the crash if the file is missing
          git add -f final_post.jpg index.html .nojekyll || true
          git commit -m "Morning News Update" || echo "No changes to commit"
          git push origin gh-pages --force