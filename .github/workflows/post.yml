name: MastJaipur Daily Post
on:
  schedule:
    - cron: '40 16 * * *'
  workflow_dispatch: 

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai requests pillow

      - name: Run News Pipeline
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
        run: python main.py

      # This is the critical step to move the image to the branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: . # This tells it to look in the current folder
          publish_branch: gh-pages
          # This ensures it ONLY keeps the image and essential files
          exclude_assets: '.github,main.py,template.png,*.ttf'