name: MastJaipur Daily Post
on:
  schedule:
    - cron: '30 1 * * *' # 7:00 AM IST
  workflow_dispatch: 

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install google-genai requests pillow

      - name: Generate News & Update Website
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
        run: python main.py

      - name: Force Push to gh-pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          git add -f final_post.jpg index.html .nojekyll
          git commit -m "Morning News Update"
          git push origin gh-pages --force

      - name: Wait for GitHub Pages to Deploy
        run: sleep 180 # Wait 3 minutes for the URL to become live

      - name: Trigger Instagram Post
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
        run: python main.py # Runs again to send the now-live URL to Instagram