name: MastJaipur Daily Post
on:
  schedule:
    - cron: '40 16 * * *'
  workflow_dispatch: 

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai requests pillow

      - name: Run News Pipeline
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
        run: python main.py

      - name: Force Push to GitHub Pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create a temp branch
          git checkout -B temp-gh-pages
          
          # Check if image was actually created
          if [ -f "final_post.jpg" ]; then
            # Force add files even if in gitignore
            git add -f final_post.jpg index.html .nojekyll
            git commit -m "Update Daily News Image"
            git push origin temp-gh-pages:gh-pages --force
            echo "Deployment successful."
          else
            echo "final_post.jpg not found. AI quota likely exceeded."
            exit 1
          fi