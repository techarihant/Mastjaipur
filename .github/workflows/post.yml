name: MastJaipur Daily Post
on:
  schedule:
    - cron: '40 16 * * *'
  workflow_dispatch: 

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai requests pillow

      - name: Run News Pipeline
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
        run: python main.py

      - name: Force Push Image to gh-pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Switch to a temporary branch to prepare the update
          git checkout -B temp-gh-pages
          
          # Add ONLY the files needed for the website
          git add -f final_post.jpg index.html .nojekyll
          
          # Commit the changes
          git commit -m "Automated update: Added final_post.jpg"
          
          # Force push the local temp branch to the remote gh-pages branch
          git push origin temp-gh-pages:gh-pages --force