name: MastJaipur Daily Post
on:
  schedule:
    - cron: '30 1 * * *' # 7:00 AM IST
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install google-genai requests pillow
      - name: Generate Image
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python main.py 
      - name: Push to Website
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          git add -f final_post.jpg index.html .nojekyll || true
          git commit -m "Update Morning Image" || echo "No changes"
          git push origin gh-pages --force

  post-to-insta:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Deployment (5 min)
        run: sleep 300 
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install google-genai requests pillow 
      - name: Post to Instagram
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID ID }}
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
        run: python main.py